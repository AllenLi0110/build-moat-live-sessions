<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Code Generator — Slide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .slide {
      width: 1280px;
      height: 720px;
      background: #0f172a;
      border-radius: 16px;
      padding: 48px 64px 36px;
      display: grid;
      grid-template-columns: 3fr 7fr;
      grid-template-rows: auto 1fr auto;
      gap: 0 40px;
      position: relative;
      overflow: hidden;
    }

    .slide::before {
      content: '';
      position: absolute;
      top: -160px; left: -160px;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(99,102,241,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 48px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -1px;
      line-height: 1;
    }

    .header .sep {
      width: 3px;
      height: 36px;
      background: #4f46e5;
      border-radius: 2px;
    }

    .header .tagline {
      font-size: 20px;
      color: #6366f1;
      font-weight: 500;
    }

    .pills {
      margin-left: auto;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pill {
      background: #1e1b4b;
      border: 1px solid #3730a3;
      color: #a5b4fc;
      font-size: 14px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 24px;
    }

    /* ── Left: features ── */
    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .features li {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 24px;
      color: #94a3b8;
      line-height: 1.3;
    }

    .features li .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      flex-shrink: 0;
    }

    .features li strong {
      color: #f1f5f9;
      font-weight: 700;
    }

    /* ── Right: screenshot ── */
    .right {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screenshot-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e293b;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
      width: 100%;
    }

    .screenshot-wrapper img {
      width: 100%;
      display: block;
    }

    /* ── Repo QR ── */
    .repo-qr {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .repo-qr img {
      width: 90px;
      height: 90px;
      border-radius: 8px;
      border: 2px solid #3730a3;
      background: #fff;
    }

    .repo-qr-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .repo-qr-label .title {
      font-size: 14px;
      font-weight: 700;
      color: #a5b4fc;
    }

    .repo-qr-label .sub {
      font-size: 12px;
      color: #475569;
    }

    /* ── Footer ── */
    .footer {
      grid-column: 1 / -1;
      border-top: 1px solid #1e293b;
      padding-top: 16px;
      margin-top: 8px;
      display: flex;
      align-items: center;
    }

    .footer .stack {
      font-size: 14px;
      color: #334155;
      font-family: 'Courier New', monospace;
    }

    .footer .name {
      margin-left: auto;
      font-size: 14px;
      color: #475569;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="slide">

    <div class="header">
      <h1>QR Code Generator</h1>
      <div class="sep"></div>
      <span class="tagline">dynamic link manager</span>
      <div class="pills">
        <span class="pill">FastAPI</span>
        <span class="pill">React + TS</span>
        <span class="pill">SQLite</span>
      </div>
    </div>

    <div class="left">
      <ul class="features">
        <li>
          <span class="dot"></span>
          <span>URL &rarr; <strong>short token</strong> + QR code</span>
        </li>
        <li>
          <span class="dot"></span>
          <span>Scan &rarr; <strong>302 redirect</strong>, update anytime</span>
        </li>
        <li>
          <span class="dot"></span>
          <span><strong>Scan analytics</strong>: count + per-day</span>
        </li>
        <li>
          <span class="dot"></span>
          <span><strong>Expiration</strong> + soft delete (410)</span>
        </li>
        <li>
          <span class="dot"></span>
          <span><strong>In-memory cache</strong> for fast redirects</span>
        </li>
      </ul>
    </div>

    <div class="right">
      <div class="screenshot-wrapper">
        <img src="images/qr-code-generator-demo.png" alt="QR Code Generator UI" />
      </div>
    </div>

    <div class="footer">
      <span class="stack">FastAPI · React · SQLite · qrcode[pil]</span>
      <span class="name">Allen Li</span>
    </div>

  </div>
</body>
</html>
